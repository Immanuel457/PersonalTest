services:
  - type: web
    name: WDN-Backend
    runtime: python
    plan: free

    rootDir: backend
    
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      
    startCommand: |
      uv run uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: PORT
        value: 10000

      - key: ENV
        value: production

    autoDeploy: true
    
